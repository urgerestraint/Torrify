# Nightly Security Workflow
# Runs automated security checks, linting, dependency audits, and build verification
# to catch issues before they reach production.

name: Nightly Security

on:
  # Run automatically every night at 2:00 AM UTC
  schedule:
    - cron: '0 2 * * *'
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Cancel in-progress runs when a new workflow is triggered
concurrency:
  group: nightly-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Secret Scanning: Detects accidentally committed API keys, passwords, etc.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive secret scanning

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Lint & Audit: Code quality and dependency vulnerabilities
  # Test against both Node.js 18 and 20 LTS
  # ---------------------------------------------------------------------------
  lint-and-audit:
    name: Lint & Audit (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      # npm audit flags:
      #   --audit-level=high  : Fails the step if vulnerabilities of severity "high" or "critical" exist.
      #                         Also reports "moderate" and "low" but does not fail on them.
      #   --omit=dev          : Skips devDependencies (optional; uncomment to audit prod deps only)
      - name: Audit dependencies
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # CodeQL: Static analysis for security vulnerabilities and code quality issues
  # JavaScript/TypeScript analysis covers .ts, .tsx, .js, .jsx files
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Required for CodeQL to upload SARIF results
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript  # Covers JavaScript and TypeScript
          # Optional: Add queries for stricter security scanning
          # queries: security-extended

      - name: Setup Node.js (for autobuild)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CodeQL autobuild infers build commands; explicit build ensures TypeScript compiles
      - name: Build (for CodeQL)
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/javascript'  # Groups results under JavaScript language

  # ---------------------------------------------------------------------------
  # Build: Verify TypeScript compiles and full build succeeds
  # ---------------------------------------------------------------------------
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
